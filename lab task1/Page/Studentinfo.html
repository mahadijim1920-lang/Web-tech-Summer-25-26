<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Information</title>
</head>
<body>
  <h2>Student Information</h2>

  <form>
    <label for="fullname">Full Name (Text)</label><br>
    <input type="text" id="fullname" name="fullname" placeholder="Enter your full name"><br><br>

    <label for="email">Email Address</label><br>
    <input type="email" id="email" name="email" placeholder="your.email@example.com"><br><br>

    <label for="password">Password</label><br>
    <input type="password" id="password" name="password" placeholder="Enter secure password"><br><br>

    <label for="age">Age (Number)</label><br>
    <input type="number" id="age" name="age" placeholder="Enter your age"><br><br>

    <label for="expdate">Experiment Date</label><br>
    <input type="date" id="expdate" name="expdate"><br><br>

    <label for="phone">Phone Number (Tel)</label><br>
    <input type="tel" id="phone" name="phone" placeholder="+880 XXXX XXXXXX"><br><br>

    <button type="submit">SUBMIT</button>
    <button type="reset">CLEAR</button>
  </form>
</body>
</html>
