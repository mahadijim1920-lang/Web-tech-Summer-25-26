<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Information</title>
  <style>
    body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background-color: #f0f0f0; }
    .form-container { background-color: #ffffff; border: 1px solid #cccccc; border-radius: 8px; padding: 20px; width: 600px; }
    .form-header { background-color: #7c6fcd; color: white; padding: 10px 15px; border-radius: 5px; display: inline-block; margin-bottom: 20px; }
    .form-row { display: flex; gap: 20px; margin-bottom: 15px; }
    .form-group { flex: 1; display: flex; flex-direction: column; }
    label { font-size: 14px; margin-bottom: 5px; color: #333; }
    input { padding: 8px 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
    .button-row { display: flex; justify-content: center; gap: 15px; margin-top: 20px; }
    .btn-submit { background-color: #7c6fcd; color: white; padding: 10px 30px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    .btn-clear { background-color: #fff; color: #333; padding: 10px 30px; border: 1px solid #ccc; border-radius: 5px; cursor: pointer; font-weight: bold; }
  </style>
</head>
<body>
  <div class="form-container">
    <div class="form-header">Student Information</div>
    <form>
      <div class="form-row">
        <div class="form-group">
          <label for="fullname">Full Name (Text)</label>
          <input type="text" id="fullname" name="fullname" placeholder="Enter your full name">
        </div>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="your.email@example.com">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter secure password">
        </div>
        <div class="form-group">
          <label for="age">Age (Number)</label>
          <input type="number" id="age" name="age" placeholder="Enter your age">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="expdate">Experiment Date</label>
          <input type="date" id="expdate" name="expdate">
        </div>
        <div class="form-group">
          <label for="phone">Phone Number (Tel)</label>
          <input type="tel" id="phone" name="phone" placeholder="+880 XXXX XXXXXX">
        </div>
      </div>
      <div class="button-row">
        <button type="submit" class="btn-submit">SUBMIT</button>
        <button type="reset" class="btn-clear">CLEAR</button>
      </div>
    </form>
    <div id="result"></div>
  </div>
  <script src="../Js/script.js"></script>
</body>
</html>
